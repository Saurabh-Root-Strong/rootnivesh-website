<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#05101F">
<title>RootNivesh Research</title>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: linear-gradient(180deg, #05101F 0%, #0B1E35 100%);
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  }
  .wrap {
    min-height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center; padding: 32px 24px;
  }
  .badge {
    font-family: 'Space Mono', monospace; font-size: 11px;
    color: #C9A84C; letter-spacing: 1.5px; text-transform: uppercase;
    border: 1px solid rgba(201,168,76,0.3);
    background: rgba(201,168,76,0.06);
    padding: 6px 14px; border-radius: 100px; margin-bottom: 18px;
  }
  h1 { font-size: 1.75rem; margin: 0 0 12px; font-weight: 700; }
  p { font-size: 14px; color: #B0BEC5; line-height: 1.5; max-width: 380px; margin: 0 0 22px; }
  .btn {
    background: linear-gradient(135deg, #C9A84C, #E8C46A);
    color: #05101F; border: none;
    padding: 12px 26px; border-radius: 8px;
    font-weight: 700; font-size: 14px;
    cursor: pointer;
  }
  .pulse {
    display: inline-block; width: 8px; height: 8px;
    border-radius: 50%; background: #2ECC71; margin-right: 6px;
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50%      { opacity: 0.4; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <span class="badge"><span class="pulse"></span>Loading RootNivesh</span>
    <h1>RootNivesh Research</h1>
    <p>SEBI Registered Research Analyst &mdash; loading the latest research, calls, and live market data.</p>
    <p id="status" style="font-size: 12px; color: #8A9BB0">If this screen stays for more than a few seconds, check your internet connection.</p>
    <button class="btn" onclick="location.reload()">Retry</button>
  </div>
  <script>
    // This page is shown only if Capacitor's server.url (rootnivesh.in) is unreachable.
    // Try to redirect to live site once the device is back online.
    function tryReload() {
      if (navigator.onLine) location.reload();
    }
    window.addEventListener('online', tryReload);
    setInterval(tryReload, 8000);
  </script>
</body>
</html>
